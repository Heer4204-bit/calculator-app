<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator App</title>

<style>
#themeBtn{

width:100%;

height:50px;

margin-bottom:15px;

font-size:18px;

border:none;

border-radius:10px;

background:#2196f3;

color:white;

cursor:pointer;

}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#222;
    font-family:Arial,sans-serif;
}

.calculator{
    background:#333;
    padding:20px;
    border-radius:15px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#display{
    width:100%;
    height:70px;
    font-size:28px;
    text-align:right;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    padding:10px;
    box-sizing:border-box;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    <button id="themeBtn" onclick="toggleTheme()">
🌙 Dark Mode
</button>
}

.number{
    background:#555;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.clear{
    background:#e53935;
    color:white;
}

.equal{
    background:#4caf50;
    color:white;
}

.light-mode{

background:#f5f5f5;

}

.light-mode .calculator{

background:white;

}

.light-mode #display{

background:#eeeeee;

color:black;

}

.light-mode .number{

background:#dddddd;

color:black;

}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="append('/')">/</button>
<button class="operator" onclick="append('*')">×</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="equal" onclick="calculate()" rowspan="2">=</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>

</div>

</div>

<script>

if(

localStorage.getItem(
"theme"
) === "true"

){

document.body.classList.add(
"light-mode"
);

}

function toggleTheme(){

document.body.classList.toggle(
"light-mode"
);

const btn =
document.getElementById(
"themeBtn"
);

if(

document.body.classList.contains(
"light-mode"
)

){

btn.innerHTML =
"🌙 Dark Mode";

}else{

btn.innerHTML =
"☀️ Light Mode";

}

}

const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

</script>

</body>
</html>
